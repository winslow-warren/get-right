<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Balance — Photo Signal Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #F7F5F2; font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes loadSlide {
  0%   { transform: translateX(-100%); }
  50%  { transform: translateX(150%); }
  100% { transform: translateX(350%); }
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div id="root"></div>

<script>
const { useState, useRef, useCallback, createElement: h } = React;

// ─── Prompts ──────────────────────────────────────────────────────────────────

const FACE_PROMPT = `You are a biometric signal interpreter for a wellness app called Balance. Analyze this selfie photo for health and wellbeing signals.

Return ONLY a JSON object with this exact structure, no preamble, no markdown:
{
  "signals": [
    { "name": "Affect valence", "value": "string (e.g. Neutral–low)", "note": "brief 1-2 sentence observation", "score": 0.0, "direction": "calm" },
    { "name": "Fatigue markers", "value": "string", "note": "brief 1-2 sentence observation", "score": 0.0, "direction": "calm" },
    { "name": "Tension pattern", "value": "string", "note": "brief 1-2 sentence observation", "score": 0.0, "direction": "calm" },
    { "name": "Arousal level", "value": "string", "note": "brief 1-2 sentence observation", "score": 0.0, "direction": "calm" }
  ],
  "narrative": "2–3 sentences synthesizing this person's current state in second person (you), empathetic and precise, no clinical tone",
  "landscape": "One sentence mapping this state to the Balance landscape metaphor — how would sky, light quality, flora, and water surface render",
  "confounders": [
    { "tag": "notice", "text": "brief contextual note that reframes or qualifies a signal" },
    { "tag": "signal", "text": "brief contextual note" }
  ]
}

Guidelines:
- score encodes activation level on that signal's natural spectrum, not valence (good/bad), range 0.0–1.0
- direction: calm = low activation/ease, mid = moderate, alert = elevated — none are inherently negative
- narrative must be second person ("you"), warm but precise
- landscape sentence must reference at least two landscape elements (sky, light, mountains, water, flora, fog, sun position)
- 2–4 confounders; prioritize environmental context, activity state, and sensor limitations`;

const POSTURE_PROMPT = `You are a posture and physical state analyst for a wellness app called Balance. Analyze this photo for postural signals.

Return ONLY a JSON object with this exact structure, no preamble, no markdown:
{
  "signals": [
    { "name": "Head position", "value": "string (e.g. Mild forward)", "note": "brief 1-2 sentence observation", "score": 0.0, "direction": "calm" },
    { "name": "Shoulder carry", "value": "string", "note": "brief 1-2 sentence observation", "score": 0.0, "direction": "calm" },
    { "name": "Spinal alignment", "value": "string", "note": "brief 1-2 sentence observation", "score": 0.0, "direction": "calm" },
    { "name": "Postural openness", "value": "string", "note": "brief 1-2 sentence observation", "score": 0.0, "direction": "calm" }
  ],
  "narrative": "2–3 sentences synthesizing this person's physical state in second person (you), focused on energy and tension patterns, no clinical tone",
  "landscape": "One sentence mapping this postural state to the Balance landscape metaphor — how the mountain silhouette, ground texture, or horizon would shift",
  "confounders": [
    { "tag": "notice", "text": "brief contextual note" },
    { "tag": "notice", "text": "brief contextual note" }
  ]
}

Guidelines:
- score for Head position: 0 = neutral aligned, 1 = strongly forward. For Spinal alignment: 0 = collapsed, 1 = upright and open
- direction for postural signals: calm = well-aligned/relaxed, mid = mild compensation, alert = notable deviation or bracing
- note should describe what is structurally visible, not prescribe correction
- landscape must reference mountain or ground terrain elements
- flag footwear and environment as confounders where visible`;

const ROOM_PROMPT = `You are an environmental signal analyst for a wellness app called Balance. Analyze this room photo for environmental and contextual wellness signals.

Return ONLY a JSON object with this exact structure, no preamble, no markdown:
{
  "signals": [
    { "name": "Spatial order", "value": "string (e.g. Low entropy)", "note": "brief 1-2 sentence observation", "score": 0.0, "direction": "calm" },
    { "name": "Light quality", "value": "string", "note": "brief 1-2 sentence observation", "score": 0.0, "direction": "calm" },
    { "name": "Social context", "value": "string", "note": "brief 1-2 sentence observation", "score": 0.0, "direction": "calm" },
    { "name": "Restorative cues", "value": "string", "note": "brief 1-2 sentence observation", "score": 0.0, "direction": "calm" }
  ],
  "narrative": "2–3 sentences synthesizing what this environment suggests about the person's current context in second person (you), empathetic and specific",
  "landscape": "One sentence mapping the room's entropy, light, and order to the Balance landscape — fog density, sky warmth, water clarity, or ground texture",
  "confounders": [
    { "tag": "notice", "text": "brief contextual note" },
    { "tag": "caution", "text": "brief contextual note" }
  ]
}

Guidelines:
- Spatial order score: 0 = high clutter/entropy, 1 = minimal/ordered
- Light quality score: 0 = dim/artificial/cold, 1 = bright/natural/warm
- Social context score: 0 = isolated, 1 = connected/active social environment
- Restorative cues score: 0 = no plants/natural elements/calming features, 1 = rich restorative environment
- direction: calm = supportive/regulated, mid = neutral/mixed, alert = stressful/depleting
- note should be observational — describe what is visible, avoid projection
- landscape line must reference at least fog, sky, or water`;

const MODE_CONFIG = {
  face:    { label: "Upload a selfie",        tabLabel: "Facial affect",  prompt: FACE_PROMPT    },
  posture: { label: "Upload a profile photo", tabLabel: "Posture",        prompt: POSTURE_PROMPT },
  room:    { label: "Upload a room photo",    tabLabel: "Environment",    prompt: ROOM_PROMPT    },
};

// ─── Colors ───────────────────────────────────────────────────────────────────

const DIR_COLOR = { calm: "#1D9E75", mid: "#BA7517", alert: "#D85A30" };
const DIR_BG    = { calm: "rgba(29,158,117,0.08)", mid: "rgba(186,117,23,0.08)", alert: "rgba(216,90,48,0.08)" };
const TAG_STYLE = {
  notice:  { bg: "#E6F1FB", color: "#185FA5", label: "notice"  },
  signal:  { bg: "#E1F5EE", color: "#0F6E56", label: "signal"  },
  caution: { bg: "#FAEEDA", color: "#854F0B", label: "caution" },
};

// ─── API — calls Netlify function proxy (no CORS, no exposed key) ─────────────

async function analyzeImage(imageBase64, mediaType, mode) {
  const response = await fetch("/.netlify/functions/analyze", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      imageBase64,
      mediaType,
      prompt: MODE_CONFIG[mode].prompt,
    }),
  });

  const data = await response.json();

  if (!response.ok || data.error) {
    throw new Error(data.error || "api_error");
  }

  return data.result;
}

function readImageFile(file) {
  return new Promise((resolve, reject) => {
    if (file.size > 4 * 1024 * 1024) { reject(new Error("too_large")); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl = e.target.result;
      resolve({ base64: dataUrl.split(",")[1], mediaType: file.type || "image/jpeg", previewUrl: dataUrl });
    };
    reader.onerror = () => reject(new Error("read_failed"));
    reader.readAsDataURL(file);
  });
}

// ─── Upload icon SVG ──────────────────────────────────────────────────────────

function UploadIcon() {
  return h("svg", { width: 18, height: 18, viewBox: "0 0 24 24", fill: "none", stroke: "#6B6560", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" },
    h("polyline", { points: "16 16 12 12 8 16" }),
    h("line", { x1: 12, y1: 12, x2: 12, y2: 21 }),
    h("path", { d: "M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3" })
  );
}

function ResetIcon() {
  return h("svg", { width: 13, height: 13, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" },
    h("polyline", { points: "1 4 1 10 7 10" }),
    h("path", { d: "M3.51 15a9 9 0 102.13-9.36L1 10" })
  );
}

// ─── Signal Card ──────────────────────────────────────────────────────────────

function SignalCard({ signal, index }) {
  const color = DIR_COLOR[signal.direction] || DIR_COLOR.mid;
  const bg    = DIR_BG[signal.direction]    || DIR_BG.mid;
  const pct   = Math.round(Math.min(1, Math.max(0, signal.score)) * 100);

  return h("div", {
    style: {
      background: "#fff", border: "0.5px solid rgba(26,23,20,0.09)", borderRadius: 14,
      padding: "14px 16px", display: "flex", flexDirection: "column", gap: 8,
      animation: "fadeUp 0.4s ease both", animationDelay: `${index * 0.07}s`,
    }
  },
    h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start" } },
      h("span", { style: { fontSize: 10, fontWeight: 500, color: "#9A948E", textTransform: "uppercase", letterSpacing: "0.1em" } }, signal.name),
      h("span", { style: { fontSize: 10, fontWeight: 500, color, background: bg, padding: "2px 7px", borderRadius: 20, letterSpacing: "0.05em", textTransform: "uppercase" } }, signal.direction)
    ),
    h("div", { style: { fontSize: 17, fontWeight: 500, color: "#1A1714", lineHeight: 1.2 } }, signal.value),
    h("div", { style: { position: "relative" } },
      h("div", { style: { height: 3, background: "rgba(26,23,20,0.07)", borderRadius: 2, overflow: "hidden" } },
        h("div", { style: { height: "100%", width: `${pct}%`, background: color, borderRadius: 2, transition: "width 0.9s cubic-bezier(0.16,1,0.3,1)" } })
      )
    ),
    h("div", { style: { fontSize: 11, color: "#6B6560", lineHeight: 1.5 } }, signal.note)
  );
}

// ─── Confounder List ──────────────────────────────────────────────────────────

function ConfounderList({ confounders }) {
  return h("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
    confounders.map((c, i) => {
      const ts = TAG_STYLE[c.tag] || TAG_STYLE.notice;
      return h("div", { key: i, style: { display: "flex", alignItems: "flex-start", gap: 10, animation: "fadeUp 0.4s ease both", animationDelay: `${0.3 + i * 0.06}s` } },
        h("span", { style: { fontSize: 10, fontWeight: 500, background: ts.bg, color: ts.color, padding: "3px 9px", borderRadius: 20, whiteSpace: "nowrap", flexShrink: 0, marginTop: 1 } }, ts.label),
        h("span", { style: { fontSize: 13, color: "#6B6560", lineHeight: 1.55 } }, c.text)
      );
    })
  );
}

// ─── Results Panel ────────────────────────────────────────────────────────────

function ResultsPanel({ result, onReset }) {
  return h("div", { style: { display: "flex", flexDirection: "column", gap: 16 } },
    h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 } },
      result.signals.map((sig, i) => h(SignalCard, { key: sig.name, signal: sig, index: i }))
    ),
    h("div", { style: { background: "#fff", border: "0.5px solid rgba(26,23,20,0.09)", borderRadius: 14, padding: "18px 20px", animation: "fadeUp 0.4s ease 0.28s both" } },
      h("p", { style: { fontFamily: "'DM Serif Display', Georgia, serif", fontStyle: "italic", fontSize: 17, lineHeight: 1.65, color: "#1A1714", margin: 0, marginBottom: 14 } }, result.narrative),
      h("div", { style: { borderTop: "0.5px solid rgba(26,23,20,0.08)", paddingTop: 12, fontSize: 13, color: "#9A948E", lineHeight: 1.5 } },
        h("span", { style: { fontWeight: 500, marginRight: 6 } }, "Landscape —"),
        result.landscape
      )
    ),
    h("div", { style: { background: "#fff", border: "0.5px solid rgba(26,23,20,0.09)", borderRadius: 14, padding: "16px 18px", animation: "fadeUp 0.4s ease 0.32s both" } },
      h("div", { style: { fontSize: 10, fontWeight: 500, color: "#9A948E", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 12 } }, "Context"),
      h(ConfounderList, { confounders: result.confounders })
    ),
    h("button", {
      onClick: onReset,
      style: { background: "none", border: "none", cursor: "pointer", fontSize: 13, color: "#9A948E", display: "flex", alignItems: "center", justifyContent: "center", gap: 5, padding: "8px 0", transition: "color 0.18s", fontFamily: "inherit" },
      onMouseEnter: e => e.currentTarget.style.color = "#1A1714",
      onMouseLeave: e => e.currentTarget.style.color = "#9A948E",
    },
      h(ResetIcon),
      "Analyze another photo"
    )
  );
}

// ─── Loading Bar ──────────────────────────────────────────────────────────────

function LoadingBar() {
  return h("div", { style: { height: 2, background: "rgba(26,23,20,0.07)", borderRadius: 1, overflow: "hidden", marginTop: 8 } },
    h("div", { style: { height: "100%", width: "40%", background: "#1A1714", borderRadius: 1, animation: "loadSlide 1.4s ease-in-out infinite" } })
  );
}

// ─── Capture Zone ─────────────────────────────────────────────────────────────

function CaptureZone({ mode, imageData, onImage, disabled }) {
  const inputRef = useRef(null);

  const handleFile = useCallback(async (file) => {
    if (!file) return;
    try {
      const data = await readImageFile(file);
      onImage(data, null);
    } catch (err) {
      const msg = err.message === "too_large"
        ? "Image too large. Please use a photo under 4MB."
        : "Could not read that file. Please try another.";
      onImage(null, msg);
    }
  }, [onImage]);

  const handleDrop = useCallback((e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  }, [handleFile]);

  const [hovered, setHovered] = useState(false);

  return h("div", {
    onClick: () => !disabled && inputRef.current?.click(),
    onDragOver: e => e.preventDefault(),
    onDrop: handleDrop,
    onMouseEnter: () => setHovered(true),
    onMouseLeave: () => setHovered(false),
    style: {
      position: "relative", aspectRatio: "4/3", borderRadius: 16,
      border: imageData ? "none" : `1.5px dashed ${hovered && !disabled ? "rgba(26,23,20,0.28)" : "rgba(26,23,20,0.14)"}`,
      background: imageData ? "transparent" : (hovered && !disabled ? "#F0EDE8" : "#F7F5F2"),
      overflow: "hidden", cursor: disabled ? "default" : "pointer",
      display: "flex", alignItems: "center", justifyContent: "center",
      transition: "border-color 0.18s, background 0.18s",
    }
  },
    imageData
      ? h("img", { src: imageData.previewUrl, alt: "Uploaded", style: { width: "100%", height: "100%", objectFit: "cover", display: "block" } })
      : h("div", { style: { display: "flex", flexDirection: "column", alignItems: "center", gap: 10 } },
          h("div", { style: { width: 44, height: 44, borderRadius: "50%", background: "rgba(26,23,20,0.06)", display: "flex", alignItems: "center", justifyContent: "center" } },
            h(UploadIcon)
          ),
          h("div", { style: { textAlign: "center" } },
            h("div", { style: { fontSize: 14, fontWeight: 500, color: "#1A1714", marginBottom: 3 } }, MODE_CONFIG[mode].label),
            h("div", { style: { fontSize: 12, color: "#9A948E" } }, "tap or drag to choose a photo")
          )
        ),
    h("input", { ref: inputRef, type: "file", accept: "image/*", style: { display: "none" }, onChange: e => handleFile(e.target.files[0]) })
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────

function App() {
  const [mode, setMode] = useState("face");
  const [appState, setAppState] = useState({ status: "idle" });

  const handleImage = useCallback((imageData, error) => {
    if (error) {
      setAppState(prev => ({ ...prev, status: prev.status === "idle" ? "idle" : "image_loaded", errorMsg: error }));
      return;
    }
    setAppState({ status: "image_loaded", imageData });
  }, []);

  const handleModeChange = useCallback((newMode) => {
    setMode(newMode);
    setAppState({ status: "idle" });
  }, []);

  const handleAnalyze = useCallback(async () => {
    if (appState.status !== "image_loaded") return;
    const { imageData } = appState;
    setAppState({ status: "analyzing", imageData });

    try {
      const result = await analyzeImage(imageData.base64, imageData.mediaType, mode);
      setAppState({ status: "success", imageData, result });
    } catch (err) {
      let msg = "Analysis unavailable. Please try again.";
      if (err.message === "api_error") msg = "API error. Check that ANTHROPIC_API_KEY is set in Netlify.";
      if (err.message.includes("parse_error")) msg = "Unexpected response format. Please try again.";
      if (err.message === "Failed to fetch") msg = "Connection failed. Please try again.";
      if (err.message.includes("ANTHROPIC_API_KEY not set")) msg = "API key not configured. Add ANTHROPIC_API_KEY in Netlify → Site configuration → Environment variables, then redeploy.";
      setAppState({ status: "error", imageData, message: msg });
    }
  }, [appState, mode]);

  const handleReset = useCallback(() => { setAppState({ status: "idle" }); }, []);

  const isAnalyzing = appState.status === "analyzing";
  const canAnalyze  = appState.status === "image_loaded" || appState.status === "error";
  const imageData   = appState.imageData || null;

  return h("div", { style: { minHeight: "100vh", background: "#F7F5F2", padding: "0 0 40px" } },

    // Header
    h("div", { style: { padding: "22px 20px 0", maxWidth: 480, margin: "0 auto" } },
      h("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 } },
        h("span", { style: { fontFamily: "'DM Serif Display', Georgia, serif", fontStyle: "italic", fontSize: 22, color: "#1A1714", letterSpacing: "-0.01em" } }, "Balance"),
        h("span", { style: { fontSize: 11, color: "#9A948E", letterSpacing: "0.08em", textTransform: "uppercase" } }, "Photo Signal Analysis")
      ),
      // Mode tabs
      h("div", { style: { display: "flex", gap: 4, background: "rgba(26,23,20,0.06)", borderRadius: 12, padding: 4, marginBottom: 16 } },
        Object.entries(MODE_CONFIG).map(([key, cfg]) => {
          const active = mode === key;
          return h("button", {
            key,
            onClick: () => handleModeChange(key),
            style: {
              flex: 1, padding: "8px 6px", borderRadius: 9,
              border: active ? "0.5px solid rgba(26,23,20,0.12)" : "none",
              background: active ? "#fff" : "transparent",
              color: active ? "#1A1714" : "#6B6560",
              fontSize: 13, fontWeight: 500, cursor: "pointer",
              transition: "all 0.18s", fontFamily: "inherit",
              boxShadow: active ? "0 1px 3px rgba(26,23,20,0.06)" : "none",
            }
          }, cfg.tabLabel);
        })
      )
    ),

    // Main content
    h("div", { style: { maxWidth: 480, margin: "0 auto", padding: "0 20px" } },

      // Capture zone
      h("div", { style: { marginBottom: 10 } },
        h(CaptureZone, { mode, imageData, onImage: handleImage, disabled: isAnalyzing })
      ),

      // Analyze button
      appState.status !== "success" && h("div", { style: { marginBottom: 4 } },
        h("button", {
          onClick: handleAnalyze,
          disabled: !canAnalyze || isAnalyzing,
          style: {
            width: "100%", padding: "14px", borderRadius: 12, border: "none",
            background: canAnalyze && !isAnalyzing ? "#1A1714" : "#C8C4BF",
            color: "#fff", fontSize: 15, fontWeight: 500,
            cursor: canAnalyze && !isAnalyzing ? "pointer" : "not-allowed",
            transition: "background 0.18s, transform 0.1s", fontFamily: "inherit",
            letterSpacing: "0.01em",
          },
          onMouseEnter: e => { if (canAnalyze && !isAnalyzing) e.currentTarget.style.background = "#2D2A26"; },
          onMouseLeave: e => { if (canAnalyze && !isAnalyzing) e.currentTarget.style.background = "#1A1714"; },
          onMouseDown:  e => { if (canAnalyze && !isAnalyzing) e.currentTarget.style.transform = "scale(0.98)"; },
          onMouseUp:    e => { e.currentTarget.style.transform = "scale(1)"; },
        }, isAnalyzing ? "Analyzing…" : "Analyze"),
        isAnalyzing && h(LoadingBar)
      ),

      // Error message
      appState.status === "error" && h("div", {
        style: { background: "#FAEEDA", border: "0.5px solid rgba(133,79,11,0.2)", borderRadius: 10, padding: "11px 14px", fontSize: 13, color: "#854F0B", marginBottom: 12, lineHeight: 1.5 }
      }, appState.message),

      // Results
      appState.status === "success" && h("div", { style: { marginTop: 16 } },
        h(ResultsPanel, { result: appState.result, onReset: handleReset })
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
